<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <link rel="stylesheet" href="styleall.css">
  
  <title>All links </title>
</head>
<body>
  <div class="site-wrapper">
  <header>
    <img src="signature.png" alt="logo rs" height="40" width="40">
    <h2>welcome</h2>
  </header>

<div class="tv-wrap">
  <div class="tv-cabinet">
    <div class="tv-bezel">
      <div class="tv-screen" id="tvScreen" tabindex="0">
        <canvas id="screen"></canvas>
        <div class="scanlines"></div>
        <div class="phosphor-glow" id="glow"></div>
        <div class="screen-glass"></div>
      </div>
    </div>

    <div class="tv-controls">
      <div class="tv-brand">find me here </div>
      <div class="indicator-row">
        <div class="led"></div>
        <span style="font-family:'VT323',monospace;font-size:14px;color:rgba(0, 0, 0, 0.867);letter-spacing:0.1em;">ON AIR</span>
      </div>
      <div class="knobs">
        <div class="knob" id="prevKnob" title="Previous channel"></div>
        <div class="knob ch-knob" id="nextKnob" title="Next channel"></div>
      </div>
    </div>
  </div>

  <div class="channel-strip" id="channelStrip"></div>
  <div class="hint">click in the name of application to find me there </div>
  
</div>
</div>
    <footer>©RS2026</footer>
  </div>
<script src="javascript.js"></script>


</body>
</html>
